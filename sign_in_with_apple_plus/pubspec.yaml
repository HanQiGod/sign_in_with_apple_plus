name: sign_in_with_apple_plus
description: Flutter 升级 3.35.7 之后，对 sign_in_with_apple 插件的升级（After Flutter upgrade 3.35.7, the upgrade of sign_in_with_apple plugins.）。
version: 7.1.0
homepage: https://github.com/HanQiGod/sign_in_with_apple_plus/tree/main/sign_in_with_apple_plus

environment:
  sdk: ^3.9.0
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter

  meta: ^1.3.0

  sign_in_with_apple_plus_platform_interface: ^3.0.0

  sign_in_with_apple_plus_web: ^4.0.0

dev_dependencies:
  flutter_lints: ^3.0.1
  flutter_test:
    sdk: flutter

# Overrides useful for local development
# dependency_overrides:
#   sign_in_with_apple_plus_platform_interface:
#     path: ../sign_in_with_apple_plus_platform_interface

#   sign_in_with_apple_plus_web:
#     path: ../sign_in_with_apple_plus_web

flutter:
  plugin:
    platforms:
      android:
        package: com.aboutyou.dart_packages.sign_in_with_apple_plus
        pluginClass: SignInWithApplePlugin
      ios:
        pluginClass: SignInWithApplePlugin
        sharedDarwinSource: true
      macos:
        pluginClass: SignInWithApplePlugin
        sharedDarwinSource: true
      web:
        default_package: sign_in_with_apple_plus_web
